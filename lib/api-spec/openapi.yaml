  /series/{id}/seasons:
    get:
      operationId: listSeasons
      tags: [seasons]
      summary: List seasons for a series
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of seasons
          content:
            application/json:
              schema:
