  /seasons/{id}:
    get:
      operationId: getSeason
      tags: [seasons]
      summary: Get a season by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Season found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateSeason
      tags: [seasons]
      summary: Update a season
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeasonUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"
        "404":
          description: Not found
          content:
            application/json:
              schema:
