  /seasons/{id}/episodes:
    get:
      operationId: listEpisodes
      tags: [episodes]
      summary: List episodes for a season
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of episodes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Episode"
    post:
      operationId: createEpisode
      tags: [episodes]
      summary: Create an episode for a season
      parameters:
