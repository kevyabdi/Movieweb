  /stats:
    get:
      operationId: getStats
      tags: [movies]
      summary: Get dashboard stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Stats:
      type: object
      properties:
        totalMovies:
          type: integer
        totalSeries:
          type: integer
        publishedMovies:
          type: integer
        publishedSeries:
          type: integer
        totalEpisodes:
          type: integer
        totalCategories:
          type: integer
        totalUsers:
          type: integer
      required:
        - totalMovies
        - totalSeries
        - publishedMovies
        - publishedSeries
        - totalEpisodes
        - totalCategories
        - totalUsers

    Movie:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        year:
          type: string
        genre:
          type: string
        rating:
          type: ["string", "null"]
        duration:
          type: ["string", "null"]
        description:
          type: string
        longDescription:
          type: ["string", "null"]
        posterUrl:
          type: ["string", "null"]
        backdropUrl:
          type: ["string", "null"]
        trailerUrl:
          type: ["string", "null"]
        embedUrl:
          type: ["string", "null"]
        quality:
          type: string
        director:
          type: ["string", "null"]
        tags:
          type: ["array", "null"]
          items:
            type: string
        status:
          type: string
        isFeatured:
          type: boolean
        isTrending:
          type: boolean
        isMostLiked:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - year
        - genre
        - description
        - quality
        - status
        - isFeatured
        - isTrending
        - isMostLiked
        - createdAt
        - updatedAt

    MovieInput:
      type: object
      properties:
        title:
          type: string
        year:
          type: string
        genre:
          type: string
        rating:
          type: string
        duration:
          type: string
        description:
          type: string
        longDescription:
          type: string
        posterUrl:
          type: string
        backdropUrl:
          type: string
        trailerUrl:
          type: string
        embedUrl:
          type: string
        quality:
          type: string
        director:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
        isFeatured:
          type: boolean
        isTrending:
          type: boolean
        isMostLiked:
          type: boolean
      required:
        - title
        - year
        - genre

    MovieUpdate:
      type: object
      properties:
        title:
          type: string
        year:
          type: string
        genre:
          type: string
        rating:
          type: string
        duration:
          type: string
        description:
          type: string
        longDescription:
          type: string
        posterUrl:
          type: string
        backdropUrl:
          type: string
        trailerUrl:
          type: string
        embedUrl:
          type: string
        quality:
          type: string
        director:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
        isFeatured:
          type: boolean
        isTrending:
          type: boolean
        isMostLiked:
          type: boolean

    Series:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        year:
          type: string
        genre:
          type: string
        rating:
          type: ["string", "null"]
        seasonsCount:
          type: integer
        description:
          type: string
        longDescription:
          type: ["string", "null"]
        posterUrl:
          type: ["string", "null"]
        backdropUrl:
          type: ["string", "null"]
        trailerUrl:
          type: ["string", "null"]
        quality:
          type: string
        director:
          type: ["string", "null"]
        tags:
          type: ["array", "null"]
          items:
            type: string
        status:
          type: string
        isFeatured:
          type: boolean
        isTrending:
          type: boolean
        isMostLiked:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - year
        - genre
        - description
        - seasonsCount
        - quality
        - status
        - isFeatured
        - isTrending
        - isMostLiked
        - createdAt
        - updatedAt

    SeriesInput:
      type: object
      properties:
        title:
          type: string
        year:
          type: string
        genre:
          type: string
        rating:
          type: string
        seasonsCount:
          type: integer
        description:
          type: string
        longDescription:
          type: string
        posterUrl:
          type: string
        backdropUrl:
          type: string
        trailerUrl:
          type: string
        quality:
          type: string
        director:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
        isFeatured:
          type: boolean
        isTrending:
          type: boolean
        isMostLiked:
          type: boolean
      required:
        - title
        - year
        - genre

    SeriesUpdate:
      type: object
      properties:
        title:
          type: string
        year:
          type: string
        genre:
          type: string
        rating:
          type: string
        seasonsCount:
          type: integer
        description:
          type: string
        longDescription:
          type: string
        posterUrl:
          type: string
        backdropUrl:
          type: string
        trailerUrl:
          type: string
        quality:
          type: string
        director:
          type: string
        tags:
          type: array
          items:
            type: string
        status:
          type: string
        isFeatured:
          type: boolean
        isTrending:
          type: boolean
        isMostLiked:
          type: boolean

    Season:
      type: object
      properties:
        id:
          type: integer
        seriesId:
          type: integer
        seasonNumber:
          type: integer
        title:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        episodesCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - seriesId
        - seasonNumber
        - episodesCount
        - createdAt
        - updatedAt

    SeasonInput:
      type: object
      properties:
        seasonNumber:
          type: integer
        title:
          type: string
        description:
          type: string
      required:
